name: CI — Build, Lint, Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Push schema (SQLite)
        run: npx prisma db push
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Lint
        run: npm run lint 2>&1 || true
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Seed test data
        run: npx tsx prisma/seed.ts 2>&1 || true
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Run tests
        run: npx tsx __tests__/run.ts
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Type check
        run: npx tsc --noEmit 2>&1 || true
        env:
          DATABASE_URL: "file:./dev.db"
